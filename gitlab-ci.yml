auto_tag:
  tags:
    - docker
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - |
      LATEST=$(curl -sf --header "PRIVATE-TOKEN: $GITLAB_API_TOKEN" \
        "$CI_API_V4_URL/projects/$CI_PROJECT_ID/repository/tags?order_by=version&sort=desc" \
        | grep -oE '"name":"v[0-9]+\.[0-9]+\.[0-9]+"' \
        | head -n1 \
        | sed 's/"name":"//; s/"$//')
      LATEST=${LATEST:-v0.0.0}
      echo "Previous: $LATEST"

      VER=${LATEST#v}
      MAJOR=${VER%%.*}
      MINOR=$(echo $VER | cut -d. -f2)
      PATCH=${VER##*.}

      PATCH=$((PATCH+1))
      if [ $PATCH -gt 9 ]; then
        PATCH=0
        MINOR=$((MINOR+1))
        if [ $MINOR -gt 9 ]; then
          MINOR=0
          MAJOR=$((MAJOR+1))
        fi
      fi

      NEW="v${MAJOR}.${MINOR}.${PATCH}"
      echo "New: $NEW"

      curl -sf --request POST \
        --header "PRIVATE-TOKEN: $GITLAB_API_TOKEN" \
        --data "tag_name=${NEW}&ref=${CI_COMMIT_SHA}&message=Release ${NEW}" \
        "$CI_API_V4_URL/projects/$CI_PROJECT_ID/repository/tags"
